<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحروق</title>
    <style>
        body {
            
            background-color: #f9f9f9;
            direction: rtl; 
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

       
        .aid-container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            
        }


        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #e74c3c; 
            padding-bottom: 10px;
            text-align: center;
        }

        h2 {
            color: #27ae60; 
            font-size: 1.3rem;
            margin-top: 25px;
        }

 
        ul {
            padding-right: 20px;
        }

        li {
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

   
        .warning-box {
            background-color: #fff5f5;
            border-right: 5px solid #e74c3c;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="aid-container">
    <h1>إسعافات الحروق والجروح</h1>
    <h2>الخطوات (افعل):</h2>
    <ul>
        <li>ضع الحرق تحت ماء جاري فاتر لمدة 10 دقائق.</li>
        <li>بالنسبة للجروح، اضغط بقطعة قماش نظيفة لوقف النزيف.</li>
        <li>غطي المنطقة بضمادة معقمة ونظيفة.</li>
    </ul>
    <div class="warning-box">
        <strong>تحذير:</strong> لا تضع معجون أسنان أو ثلج على الحرق، ولا تنزع الأجسام المنغرسة في الجرح.
    </div>
    <a href="الاسعافات.html" class="back-btn">← العودة للرئيسية</a>
</div>
</body>
</html>
