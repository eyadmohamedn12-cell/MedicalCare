<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إسعافات أولية</title>
    <style>
        
        body {
            
            background-color: #f9f9f9;
            direction: rtl; 
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

       
        .aid-container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            
        }


        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #e74c3c; 
            padding-bottom: 10px;
            text-align: center;
        }

        h2 {
            color: #27ae60; 
            font-size: 1.3rem;
            margin-top: 25px;
        }

 
        ul {
            padding-right: 20px;
        }

        li {
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

   
        .warning-box {
            background-color: #fff5f5;
            border-right: 5px solid #e74c3c;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>إسعاف الإغماء</h1>
        <p><strong>ماذا تفعل؟</strong></p>
        <ul>
            <li>تأكد من التنفس ومجرى الهواء.</li>
            <li>ارفع القدمين للأعلى (30 سم).</li>
            <li>فك الملابس الضيقة.</li>
        </ul>
        <p><strong>تحذير:</strong> لا ترش الماء بعنف ولا تعطِ سوائل للمغمى عليه.</p>
        
        <a href="الاسعافات.html" class="btn-back">← العودة للرئيسية</a>
